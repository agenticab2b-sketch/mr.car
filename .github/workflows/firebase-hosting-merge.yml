name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run quality gate
        run: node .github/scripts/quality-gate.js
      - name: Check Generated Output Synchronization
        run: |
          node build.js
          if [[ `git status --porcelain` ]]; then
            echo "Generated output is out of sync. Please run build.js locally and commit the changes."
            git status --porcelain
            exit 1
          fi
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MRCAR_473416 }}'
      - name: Deploy Hosting and Functions
        run: npx firebase-tools deploy --only hosting,functions --project mrcar-473416 --non-interactive
